<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
    <link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-square.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css"
        integrity="sha512-1sCRPdkRXhBV2PBLUdRb4tMg1w2YPf37qatUFeS7zlBy7jJI8Lf4VHwWfZZfpXtYSLy85pkm9GaYVYMfw5BC1A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>mignonwhale's Momentum</title>
</head>

<body>
    <div class="weather-container hidden">
        <div class="weather">
            <span id="imoticon"></span>
            <span id="temp"></span>
            <span>°</span>
        </div>
        <span class="area" id="area"></span>
    </div>
    <div class="clock-container">
        <span id="clock" class="hidden"></span>
    </div>
    <div class="greeting-container">
        <form id="login-form" class="login-form hidden">
            <h3>Hello, what's your name?</h3>
            <input type="text" id="login-name" class="input-Style login-name" maxlength="15" required>
        </form>
        <h3 id="greeting" class="hidden"></h3>
            
    </div>
    <div class="todo-container" >
        <form id="todo-form" class="hidden">
            <h3>What is your plan for today?</h3>
            <input type="text" id="todo-input" class="input-Style todo-input">
        </form>
        <ul id="todo-list"></ul>
    </div>
    <div class="quote-container hidden">
        <span id="quote">명언</span>
        <span id="author">명언</span>
    </div>
    
    <script src="js/greeting.js"></script>
    <script src="js/background.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/todo.js"></script>
    <script src="js/quote.js"></script>
</body>

</html>
